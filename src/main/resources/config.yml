# WelcomePlayer 插件配置文件
# 玩家加入服务器时发送的欢迎消息

# 是否启用欢迎消息功能
enabled: true

# 欢迎消息列表（支持多条消息，按顺序发送）
# 支持颜色代码和格式代码
# 使用 & 符号后跟颜色/格式代码，例如: &a表示绿色, &l表示粗体
messages:
  - "&e================================"
  - "&a欢迎 &6%player_name% &a加入服务器！"
  - "&b祝你游戏愉快！"
  - "&e================================"

# 是否在发送消息前延迟（单位：秒，0表示立即发送）
delay: 1

# 是否只在玩家首次加入时发送欢迎消息
first-join-only: false
